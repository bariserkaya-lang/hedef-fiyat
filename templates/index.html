<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .stats { background: #f0f0f0; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .stat { display: inline-block; margin-right: 40px; }
        .stat-number { font-size: 32px; font-weight: bold; color: #2c3e50; }
        .menu a { display: inline-block; margin-right: 20px; padding: 10px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; margin-bottom: 10px; }
        .menu a:hover { background: #2980b9; }
    </style>
</head>
<body>
    <h1>BIST Hedef Fiyat - Admin Panel</h1>
    <div class="stats">
        <div class="stat"><div class="stat-number" id="total">-</div><div>Toplam Tahmin</div></div>
        <div class="stat"><div class="stat-number" id="stocks">-</div><div>Hisse Sayısı</div></div>
        <div class="stat"><div class="stat-number" id="brokers">-</div><div>Kurum Sayısı</div></div>
    </div>
    <div class="menu">
        <a href="/list">📋 Tahmin Listesi</a>
        <a href="/add">➕ Yeni Tahmin Ekle</a>
        <a href="/adjustments">🔧 Bölünme Düzeltmeleri</a>
        <a href="/kapanis_duzenle">📊 Kapanış Düzenle</a>
    </div>
    <script>
        fetch('/api/stats').then(r=>r.json()).then(d=>{
            document.getElementById('total').innerText = d.total;
            document.getElementById('stocks').innerText = d.stocks;
            document.getElementById('brokers').innerText = d.brokers;
        });
    </script>
</body>
</html>
